<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PTT Profissional</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    padding: 15px;
    max-width: 500px;
    margin: auto;
  }

  h2 {
    text-align: center;
    margin-top: 20px;
  }

  #status {
    text-align: center;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 20px;
    background: #1e293b;
    padding: 8px;
    border-radius: 8px;
  }

  .user-list-container {
    background: #111827;
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #374151;
  }

  .list-title {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 8px;
    padding-left: 5px;
  }

  ul {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 35vh;
    overflow-y: auto;
  }

  li {
    padding: 12px;
    margin-bottom: 8px;
    background: #1e293b;
    border-radius: 10px;
    font-size: 16px;
    border: 1px solid transparent;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.3s;
  }

  li.talking {
    background: #7f1d1d;
    border-color: #ef4444;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
  }

  li:last-child {
    margin-bottom: 0;
  }

  .empty-list {
    text-align: center;
    color: #64748b;
    padding: 15px;
    font-style: italic;
    background: #1e293b;
    border-radius: 10px;
    display: block;
  }

  .ptt-container {
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
  }

  .ptt {
    width: 65vw;
    max-width: 210px;
    height: 65vw;
    max-height: 210px;
    border-radius: 50%;
    border: 6px solid #450a0a;
    font-size: 18px;
    font-weight: bold;
    background: #dc2626;
    color: white;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    transition: background 0.1s, transform 0.05s;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .ptt:active, .ptt.active {
    background: #16a34a;
    border-color: #052e16;
    transform: scale(0.96);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  }

  /* Estado quando outro usuário está falando */
  .ptt.busy {
    background: #4b5563 !important;
    border-color: #1f2937 !important;
    color: #94a3b8 !important;
    cursor: not-allowed;
    transform: none !important;
  }
</style>
</head>

<body>

<div class="container">
  <h2>📡 Rádio PTT (Grupo)</h2>
  <div id="status">Conectando ao servidor...</div>
  
  <div class="user-list-container">
    <div class="list-title">Membros na Escuta:</div>
    <ul id="users">
      <li class="empty-list">Aguardando conexão...</li>
    </ul>
  </div>
</div>

<div class="ptt-container">
  <button id="talk" class="ptt">FALAR NO GRUPO</button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>
const BACKEND_URL = "https://radio2-yocz.onrender.com";

const socket = io(BACKEND_URL, {
  transports: ["polling", "websocket"],
  timeout: 20000,
  forceNew: true
});

let myPeer;
let myStream;
let activeCalls = [];
let onlineUsers = [];
let isTalking = false;
let isBusy = false; // Bloqueia se outra pessoa estiver falando

const statusEl = document.getElementById('status');
const usersEl = document.getElementById('users');
const talkBtn = document.getElementById('talk');

const name = prompt("Seu nome:") || "Usuário-" + Math.floor(1000 + Math.random() * 9000);

// Sons de Feedback PTT
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(freq, duration) {
  try {
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.value = 0.1;
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start();
    setTimeout(() => osc.stop(), duration);
  } catch (e) { console.error(e); }
}

socket.on('connect', () => {
  console.log("🟢 Socket.io conectado!");
  statusEl.innerText = `Online como: ${name}`;
  if (myPeer && myPeer.id) {
    socket.emit('register', { peerId: myPeer.id, name });
  }
});

socket.on('connect_error', () => {
  statusEl.innerText = "Erro ao conectar no servidor. Reconectando...";
});

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
  myStream = stream;
  myStream.getAudioTracks()[0].enabled = false;

  myPeer = new Peer(undefined, {
    host: "radio2-yocz.onrender.com",
    port: 443,
    path: "/peerjs",
    secure: true,
    config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }
  });

  myPeer.on('open', (id) => {
    console.log("🟢 PeerJS pronto com ID:", id);
    if (socket.connected) {
      statusEl.innerText = `Online como: ${name}`;
      socket.emit('register', { peerId: id, name });
    }
  });

  myPeer.on('call', (call) => {
    call.answer(myStream);
    call.on('stream', (remoteStream) => {
      playAudio(remoteStream);
    });
  });

}).catch(err => {
  statusEl.innerText = "Erro: Microfone bloqueado.";
});

// Presença e status de transmissão
socket.on('presence', (users) => {
  console.log("👥 Usuários ativos:", users);
  usersEl.innerHTML = '';

  onlineUsers = users.filter(u => {
    const id = u.peerId || u.id;
    return id !== myPeer?.id;
  });

  if (onlineUsers.length === 0) {
    usersEl.innerHTML = '<li class="empty-list">Nenhum outro membro online.</li>';
    return;
  }

  onlineUsers.forEach(user => {
    const li = document.createElement('li');
    li.id = `user-${user.peerId || user.id}`;
    
    // Altera estilo se o usuário estiver falando
    if (user.isTalking) {
      li.classList.add('talking');
      li.innerHTML = `<span>🎤 <b>${user.name}</b></span> <small>TRANSMITINDO...</small>`;
    } else {
      li.innerHTML = `<span>🟢 ${user.name || "Sem Nome"}</span>`;
    }
    
    usersEl.appendChild(li);
  });
});

// Escuta quando alguém do grupo começa/para de falar para bloquear o PTT
socket.on('user_talking', (data) => {
  if (data.peerId !== myPeer?.id) {
    isBusy = data.isTalking;
    if (isBusy) {
      talkBtn.classList.add('busy');
      talkBtn.innerText = `${data.name.toUpperCase()} FALANDO...`;
    } else {
      talkBtn.classList.remove('busy');
      talkBtn.innerText = "FALAR NO GRUPO";
    }
  }
});

function broadcastToGroup() {
  if (!myStream || !myPeer) return;
  
  onlineUsers.forEach(user => {
    const targetId = user.peerId || user.id;
    if (targetId) {
      const call = myPeer.call(targetId, myStream);
      call.on('stream', (remoteStream) => {
        playAudio(remoteStream);
      });
      activeCalls.push(call);
    }
  });
}

function playAudio(stream) {
  const existingAudio = document.getElementById(stream.id);
  if (existingAudio) return;

  const audio = document.createElement('audio');
  audio.id = stream.id;
  audio.srcObject = stream;
  audio.play().catch(e => console.error("Erro no áudio:", e));
}

// 🔴 Começar a falar
function startTalking(e) {
  if (e) e.preventDefault();

  if (isBusy) return; // Bloqueia se o canal estiver ocupado
  if (onlineUsers.length === 0) {
    alert("Não há ninguém no grupo para ouvir.");
    return;
  }
  if (isTalking) return;
  isTalking = true;

  playBeep(800, 100); // Bip inicial

  if (myStream && myStream.getAudioTracks()[0]) {
    myStream.getAudioTracks()[0].enabled = true;
  }
  
  broadcastToGroup();

  // Avisa o servidor que estou falando para bloquear os outros
  socket.emit('talking_state', { isTalking: true, name });

  talkBtn.classList.add('active');
  talkBtn.innerText = "TRANSMITINDO AO VIVO";
}

// 🛑 Parar de falar
function stopTalking(e) {
  if (e) e.preventDefault();
  if (!isTalking) return;
  isTalking = false;

  playBeep(600, 120); // Bip final

  if (myStream && myStream.getAudioTracks()[0]) {
    myStream.getAudioTracks()[0].enabled = false;
  }

  activeCalls.forEach(call => { if (call.open) call.close(); });
  activeCalls = [];

  // Avisa o servidor que parei de falar
  socket.emit('talking_state', { isTalking: false, name });

  talkBtn.classList.remove('active');
  talkBtn.innerText = "FALAR NO GRUPO";
}

talkBtn.addEventListener('pointerdown', startTalking);
talkBtn.addEventListener('pointerup', stopTalking);
talkBtn.addEventListener('pointerleave', stopTalking);
talkBtn.addEventListener('pointercancel', stopTalking);
talkBtn.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
